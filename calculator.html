<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rubik&display=swap"
      rel="stylesheet"
    />
    <title>Calculator</title>
    <style type="text/tailwindcss">
      @theme {
        --text: #ebebeb;
        --text-secondary: #6b6b6b;
        --primary: #462878;
        --background: #2d2a37;
        --gradient:
          180deg, rgba(0, 0, 0, 0.05) 0%, rgba(255, 255, 255, 0.05) 100%;
        --gradient-hover:
          180deg, rgba(0, 0, 0, 0.01) 0%, rgba(255, 255, 255, 0.01) 100%;
        --shadow:
          0px 11px 7px 0px rgba(0, 0, 0, 0.01),
          0px 7px 7px 0px rgba(0, 0, 0, 0.04),
          0px 4px 6px 0px rgba(0, 0, 0, 0.1),
          0px 2px 4px 0px rgba(0, 0, 0, 0.26),
          0px 0px 2px 0px rgba(0, 0, 0, 0.29),
          0px 2px 3px 0px rgba(255, 255, 255, 0.06) inset;
        --font-sans: 'Rubik', sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-linear-[180deg,_#807ECE_0%,_#807ECE_100%] min-h-screen text-(--text) font-(--font-sans)"
  >
    <div id="root"></div>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const textVariants = {
        default: 'text-xl',
        muted: 'text-xl text-(--text-secondary)',
        heading: 'text-2xl',
        blast: 'text-3xl',
      }

      const buttonVariants = {
        default: 'bg-(--background)',
        primary: 'bg-(--primary)',
      }

      function Button({ variant = 'default', className, children, ...props }) {
        return (
          <Text
            as="button"
            variant="heading"
            className={`
            flex items-center justify-center rounded-xl
            p-3 cursor-pointer text-(--text)
            bg-linear-(--gradient)
            hover:bg-linear-(--gradient-hover)
            shadow-(--shadow)
            ${buttonVariants[variant]}
            ${className ? className : ''}
          `}
            {...props}
          >
            {children}
          </Text>
        )
      }

      function Text({
        as = 'span',
        variant = 'default',
        className,
        children,
        ...props
      }) {
        return React.createElement(
          as,
          {
            className: `${textVariants[variant]} ${className ? className : null}`,
            ...props,
          },
          children,
        )
      }

      function Card({ children, className, ...props }) {
        return (
          <div
            className={`bg-(--background)
          shadow-(--shadow)
          rounded-2xl
          ${className ? className : null}
          `}
          >
            {children}
          </div>
        )
      }

      const Buttons = [
        [
          { input: 'CE' },
          { input: 'C', className: 'flex-1 h-16' },
          { input: '/', variant: 'primary' },
        ],
        [
          { input: '7' },
          { input: '8' },
          { input: '9' },
          { input: '*', variant: 'primary' },
        ],

        [
          { input: '4' },
          { input: '5' },
          { input: '6' },
          { input: '-', variant: 'primary' },
        ],

        [
          { input: '1' },
          { input: '2' },
          { input: '3' },
          { input: '+', variant: 'primary' },
        ],

        [
          { input: '0', className: 'flex-1 h-16' },
          { input: ',' },
          { input: '=', className: 'w-16 h-16 bg-[#7F45E2]' },
        ],
      ]

      function CalculatorDisplay({ operation, result }) {
        return (
          <div
            className={`
              flex flex-col gap-2 px-[1.375rem]
              cursor-default select-none
            `}
          >
            <Text
              as="div"
              variant="muted"
              className={`
                flex items-center justify-end h-7
              `}
            >
              {result && operation}
            </Text>
            <div
              className={`
                  flex items-center justify-between h-9
                `}
            >
              <Text variant="muted"> = </Text>
              <Text variant="blast"> {result || operation} </Text>
            </div>
          </div>
        )
      }

      function Calculator() {
        const [operation, setOperation] = React.useState('')
        const [result, setResult] = React.useState('')

        function handleClick(input) {
          if (input === 'C') {
            setOperation('')
            setResult('')
          }

          if (input === 'CE') {
            setResult('')
            setOperation(operation.slice(0, -1))
          }

          if (input === '=') {
            const operationResult = eval(operation.replace(/,/g, '.'))
            const parsedResult = operationResult.toString().replace(/\./g, ',')
            setResult(parsedResult)
            return
          }

          if (result) {
            setOperation(isNaN(input) ? `${result}${input}` : input)
            setResult('')
            return
          }

          if (input === ',') {
            if (!operation.endsWith(',')) {
              setOperation(`${operation},`)
            }
            return
          }

          setOperation(`${operation}${input}`)
        }

        return (
          <Card
            className={`
          flex flex-col gap-[1.625rem] w-[22.25rem]
          pt-14 px-8 pb-8
        `}
          >
            <CalculatorDisplay operation={operation} result={result} />

            <div className="flex flex-col gap-3">
              {Buttons.map((row, index) => (
                <div key={`row-${index}`} className="flex gap-3">
                  {row.map(({ input, className, variant }) => (
                    <Button
                      onClick={() => handleClick(input)}
                      className={className || 'w-16 h-16'}
                      variant={variant}
                    >
                      {input}
                    </Button>
                  ))}
                </div>
              ))}
            </div>
          </Card>
        )
      }

      function OperationHistory() {
        return (
          <Card className="w-full py-10 px-8">
            <Text as="h1" variant="heading" className="mb-4">
              Operation History
            </Text>
            <ul className="flex flex-col gap-3">
              <Text as="li"> 1 + 1 = 2 </Text>
              <Text as="li"> 2 + 3 + 1 = 6 </Text>
              <Text as="li"> 2 + 3 = 5 </Text>
            </ul>
          </Card>
        )
      }

      function App() {
        return (
          <main className="flex flex-col sm:flex-row items-center sm:items-stretch gap-2 py-28 px-4 sm:px-10">
            <Calculator />
            <OperationHistory />
          </main>
        )
      }

      const root = ReactDOM.createRoot(document.getElementById('root'))
      root.render(<App />)
    </script>
  </body>
</html>
